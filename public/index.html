<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>FreeWave Proxy</title>
    <link rel="shortcut icon" href="favicon.ico" />
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    <link rel="stylesheet" href="style.css" />
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <div id="home-screen">
      <header>
        <div class="logo-area">
          <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="18" stroke="url(#grad)" stroke-width="2.5"/>
            <path d="M10 20 Q15 10 20 20 Q25 30 30 20" stroke="url(#grad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <defs>
              <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#a78bfa"/>
                <stop offset="100%" stop-color="#38bdf8"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">FreeWave</span>
        </div>
        <p class="tagline">Browse freely &mdash; stream anything, anywhere</p>
      </header>

      <div class="search-container">
        <form id="proxy-form">
          <div class="search-bar">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
              id="proxy-input"
              type="text"
              placeholder="Enter a URL or search term..."
              autocomplete="off"
              spellcheck="false"
            />
            <button type="submit" class="go-btn">Go</button>
          </div>
        </form>
      </div>

      <div class="categories">
        <div class="category">
          <h3 class="category-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            Anime &amp; Video
          </h3>
          <div class="quick-links">
            <button class="quick-btn" data-url="https://www.crunchyroll.com">Crunchyroll</button>
            <button class="quick-btn" data-url="https://www.funimation.com">Funimation</button>
            <button class="quick-btn" data-url="https://www.youtube.com">YouTube</button>
            <button class="quick-btn" data-url="https://www.netflix.com">Netflix</button>
            <button class="quick-btn" data-url="https://www.twitch.tv">Twitch</button>
            <button class="quick-btn" data-url="https://aniwatch.to">AniWatch</button>
            <button class="quick-btn" data-url="https://hianime.to">HiAnime</button>
            <button class="quick-btn" data-url="https://www.hulu.com">Hulu</button>
          </div>
        </div>

        <div class="category">
          <h3 class="category-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            Music
          </h3>
          <div class="quick-links">
            <button class="quick-btn" data-url="https://open.spotify.com">Spotify</button>
            <button class="quick-btn" data-url="https://music.youtube.com">YT Music</button>
            <button class="quick-btn" data-url="https://www.soundcloud.com">SoundCloud</button>
            <button class="quick-btn" data-url="https://www.pandora.com">Pandora</button>
            <button class="quick-btn" data-url="https://music.apple.com">Apple Music</button>
            <button class="quick-btn" data-url="https://www.deezer.com">Deezer</button>
            <button class="quick-btn" data-url="https://www.last.fm">Last.fm</button>
            <button class="quick-btn" data-url="https://bandcamp.com">Bandcamp</button>
          </div>
        </div>

        <div class="category">
          <h3 class="category-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            Games
          </h3>
          <div class="quick-links">
            <button class="quick-btn" data-url="https://www.roblox.com">Roblox</button>
            <button class="quick-btn" data-url="https://poki.com">Poki</button>
            <button class="quick-btn" data-url="https://www.crazygames.com">CrazyGames</button>
            <button class="quick-btn" data-url="https://itch.io">itch.io</button>
            <button class="quick-btn" data-url="https://www.miniclip.com">Miniclip</button>
            <button class="quick-btn" data-url="https://www.coolmathgames.com">CoolMathGames</button>
            <button class="quick-btn" data-url="https://store.steampowered.com">Steam</button>
            <button class="quick-btn" data-url="https://www.kongregate.com">Kongregate</button>
          </div>
        </div>

        <div class="category">
          <h3 class="category-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            Social &amp; More
          </h3>
          <div class="quick-links">
            <button class="quick-btn" data-url="https://www.reddit.com">Reddit</button>
            <button class="quick-btn" data-url="https://twitter.com">Twitter/X</button>
            <button class="quick-btn" data-url="https://www.instagram.com">Instagram</button>
            <button class="quick-btn" data-url="https://discord.com">Discord</button>
            <button class="quick-btn" data-url="https://www.google.com">Google</button>
            <button class="quick-btn" data-url="https://www.wikipedia.org">Wikipedia</button>
            <button class="quick-btn" data-url="https://www.tiktok.com">TikTok</button>
            <button class="quick-btn" data-url="https://www.pinterest.com">Pinterest</button>
          </div>
        </div>
      </div>

      <div id="error-area" class="error-area" style="display:none;">
        <p id="error-msg"></p>
        <pre id="error-code"></pre>
      </div>

      <footer>
        <span>FreeWave &mdash; Powered by <a href="https://github.com/MercuryWorkshop/scramjet" target="_blank">Scramjet</a></span>
        <span class="footer-note">For educational and personal use only.</span>
      </footer>
    </div>

    <div id="browser-chrome" style="display:none;">
      <div class="browser-toolbar">
        <button id="btn-home" class="toolbar-btn" title="Home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <button id="btn-back" class="toolbar-btn" title="Back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button id="btn-forward" class="toolbar-btn" title="Forward">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button id="btn-reload" class="toolbar-btn" title="Reload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <div class="url-bar-wrapper">
          <form id="nav-form">
            <input id="nav-input" type="text" placeholder="Enter URL or search..." autocomplete="off" spellcheck="false" />
          </form>
        </div>
        <button id="btn-fullscreen" class="toolbar-btn" title="Fullscreen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        </button>
      </div>
      <div id="frame-container"></div>
    </div>
  </body>
</html>
